version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: teamsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamsync
    ports:
      - "5433:5432"
    volumes:
      - teamsync_postgres_data:/var/lib/postgresql/data

volumes:
  teamsync_postgres_data: